<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>都営三田線 列車運行位置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Meiryo", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-top: 2px solid #0079C2;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      bottom: 0;
      z-index: 100;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .line-color-bar {
      width: 6px;
      height: 32px;
      background: #0079C2;
      border-radius: 3px;
    }

    header h1 {
      font-size: 0.8rem;
      font-weight: 400;
      color: #f0f4ff;
    }

    header h1 small {
      display: block;
      font-size: 0.72rem;
      font-weight: 400;
      color: #8892b0;
      margin-top: 1px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
      color: #8892b0;
    }

    .holiday-warn {
      font-size: 0.75rem;
      color: #f87171;
      border: 1px solid #f87171;
      border-radius: 4px;
      padding: 1px 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }

    .status-dot.loading { background: #facc15; animation: none; }
    .status-dot.error   { background: #f87171; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .refresh-btn {
      background: #2d3148;
      border: 1px solid #3d4268;
      color: #a0aec0;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .refresh-btn:hover { background: #3d4268; color: #e2e8f0; }

    .countdown { font-size: 0.75rem; color: #4d5380; }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 4px 20px;
    }

    .error-banner {
      background: #2d1010;
      border: 1px solid #7f1d1d;
      color: #f87171;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.85rem;
    }

    /* === Route Diagram === */
    .diagram-wrapper {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 20px 0;
      overflow: hidden;
    }

    /* Each station row */
    .station-row {
      display: grid;
      grid-template-columns: 130px 36px 1fr;
      align-items: center;
      min-height: 52px;
      position: relative;
    }

    .station-row:last-child .line-seg-bottom { display: none; }

    .station-row.highlight {
      background: rgba(52, 211, 153, 0.08);
      border-top: 1px solid rgba(52, 211, 153, 0.3);
      border-bottom: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 6px;
    }

    .station-row.highlight .station-name {
      color: #6ee7b7;
      font-weight: 600;
    }

    .station-name {
      text-align: right;
      padding-right: 8px;
      font-size: 0.82rem;
      color: #c8d3f5;
      line-height: 1.2;
    }

    /* Center track column */
    .track-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      height: 100%;
    }

    .line-seg-top {
      width: 4px;
      background: #0079C2;
      flex: 1;
    }

    .station-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #0079C2;
      border: 3px solid #1a1d27;
      outline: 2px solid #0079C2;
      z-index: 1;
      flex-shrink: 0;
    }

    .line-seg-bottom {
      width: 4px;
      background: #0079C2;
      flex: 1;
    }

    /* Train lanes */
    .lane {
      position: relative;
      height: 52px;
      display: flex;
      align-items: center;
    }

    /* Train badge */
    .train-badge {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 7px;
      border-radius: 5px;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
      z-index: 10;
      border: 1px solid transparent;
      top: 50%;
    }

    .train-badge:hover {
      transform: translateY(-50%) scale(1.07);
      z-index: 20;
    }

    /* Position: at station → centered; between → offset */
    .train-badge.at-station { transform: translateY(-50%); }
    .train-badge.between    { transform: translateY(calc(-50% + 26px)); } /* below center = between rows */

    /* 6両: 細い左ボーダー */
    .train-badge.car-6             { border-left-width: 2px; }
    .train-badge.car-6.delay-0     { background: #1a2744; color: #7aa4cc; border-color: #2a3d66; }
    .train-badge.car-6.delay-small { background: #2d1f00; color: #c49a30; border-color: #5a3d00; }
    .train-badge.car-6.delay-large { background: #2d0a0a; color: #c05050; border-color: #5a1414; }

    /* 8両: 全周ボーダー（左右太く・上下細く）＋濃い背景 */
    .train-badge.car-8             { border-left-width: 5px; border-right-width: 5px; border-top-width: 2px; border-bottom-width: 2px; }
    .train-badge.car-8.delay-0     { background: #0d1f3d; color: #90c4f0; border-color: #60a5fa; }
    .train-badge.car-8.delay-small { background: #1f1200; color: #e0aa30; border-color: #fbbf24; }
    .train-badge.car-8.delay-large { background: #1f0505; color: #e06060; border-color: #f87171; }

    /* Popup */
    .popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
    }

    .popup-overlay.active { display: block; }

    .popup {
      position: fixed;
      background: #1e2235;
      border: 1px solid #3d4268;
      border-radius: 10px;
      padding: 16px 18px;
      min-width: 220px;
      max-width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 201;
    }

    .popup-title {
      font-size: 1rem;
      font-weight: 700;
      color: #f0f4ff;
      margin-bottom: 4px;
    }

    .popup-type {
      font-size: 0.72rem;
      color: #8892b0;
      margin-bottom: 10px;
    }

    .popup-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      padding: 4px 0;
      border-bottom: 1px solid #2d3148;
      color: #c8d3f5;
    }

    .popup-row:last-child { border-bottom: none; }

    .popup-row .label { color: #6b7280; }

    .popup-close {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #6b7280;
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
    }

    .popup-close:hover { color: #e2e8f0; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #4d5380;
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  </style>
</head>
<body>

<main>
  <div id="errorBanner" class="error-banner" style="display:none"></div>
  <div id="content"></div>
</main>

<header>
  <div class="header-left">
    <div class="line-color-bar"></div>
    <h1>西高島平 → 三田</h1>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <button class="refresh-btn" onclick="fetchTrains()">更新</button>
    <span class="holiday-warn" id="holidayWarn" style="display:none">祝日非対応</span>
  </div>
</header>

<!-- Popup -->
<div class="popup-overlay" id="popupOverlay" onclick="closePopup(event)">
  <div class="popup" id="popup">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div class="popup-title" id="popupTitle"></div>
    <div class="popup-type" id="popupType"></div>
    <div id="popupRows"></div>
  </div>
</div>

<script>
const API_URL = 'https://api-public.odpt.org/api/v4/odpt:Train?odpt:railway=odpt.Railway:Toei.Mita';
const REFRESH_INTERVAL = 30;

// Station list: index 0 = 西高島平 (top), index 18 = 大手町 (bottom)
// Displayed top-to-bottom matching north→south direction
const STATIONS = [
  { suffix: 'NishiTakashimadaira',    ja: '西高島平' },
  { suffix: 'ShinTakashimadaira',     ja: '新高島平' },
  { suffix: 'Takashimadaira',         ja: '高島平' },
  { suffix: 'Nishidai',              ja: '西台' },
  { suffix: 'Hasune',                ja: '蓮根' },
  { suffix: 'ShimuraSanchome',       ja: '志村三丁目' },
  { suffix: 'ShimuraSakaue',         ja: '志村坂上' },
  { suffix: 'Motohasunuma',          ja: '本蓮沼' },
  { suffix: 'ItabashiHoncho',        ja: '板橋本町' },
  { suffix: 'ItabashiKuyakushomae',  ja: '板橋区役所前' },
  { suffix: 'ShinItabashi',          ja: '新板橋' },
  { suffix: 'NishiSugamo',           ja: '西巣鴨' },
  { suffix: 'Sugamo',                ja: '巣鴨' },
  { suffix: 'Sengoku',               ja: '千石' },
  { suffix: 'Hakusan',               ja: '白山' },
  { suffix: 'Kasuga',                ja: '春日' },
  { suffix: 'Suidobashi',            ja: '水道橋' },
  { suffix: 'Jimbocho',              ja: '神保町' },
  { suffix: 'Otemachi',              ja: '大手町' },
  { suffix: 'Hibiya',               ja: '日比谷' },
  { suffix: 'Uchisaiwaicho',        ja: '内幸町' },
  { suffix: 'Onarimon',             ja: '御成門' },
  { suffix: 'Shibakoen',            ja: '芝公園' },
  { suffix: 'Mita',                 ja: '三田' },
];

// suffix → index map
const STATION_INDEX = {};
STATIONS.forEach((s, i) => { STATION_INDEX[s.suffix.toLowerCase()] = i; });

// Japanese name lookup for stations outside the Mita 19 (through-service destinations etc.)
const EXTRA_STATION_NAMES = {
  'Meguro':           '目黒',
  'Fudoumae':         '不動前',
  'Musashikoyama':    '武蔵小山',
  'Nishikoyama':      '西小山',
  'Ookayama':         '大岡山',
  'Jiyugaoka':        '自由が丘',
  'Midorigaoka':      '緑が丘',
  'Kuhombutsu':       '九品仏',
  'Yukigaya-otsuka':  '雪が谷大塚',
  'YukigayaOtsuka':   '雪が谷大塚',
  'Ishikawa-cho':     '石川町',
  'KikuName':         '菊名',
  'Hiyoshi':          '日吉',
  'Musashikosugi':    '武蔵小杉',
  'Shin-Maruko':      '新丸子',
  'ShinMaruko':       '新丸子',
  'Tamagawa':         '多摩川',
  'Kamata':           '蒲田',
  'Ikegami':          '池上',
  'Togoshi':          '戸越',
  'Hatanodai':        '旗の台',
  'Mizonokuchi':      '溝の口',
  'Saginuma':         '鷺沼',
  'Tama-Plaza':       'たまプラーザ',
  'TamaPlaza':        'たまプラーザ',
  'Azamino':          'あざみ野',
  'Shin-Yurigaoka':   '新百合ヶ丘',
  'ShinYurigaoka':    '新百合ヶ丘',
  'Nagayama':         '永山',
  'Tama-Center':      '多摩センター',
  'TamaCenter':       '多摩センター',
  'Karakida':         '唐木田',
  // Tokyu Meguro line
  'ShirokaneTakanawa':    '白金高輪',
  'Shirokanedai':         '白金台',
  'Shirokane-Takanawa':   '白金高輪',
  'Shirokane':            '白金',
  'Hiroo':                '広尾',
  'Ebisu':                '恵比寿',
  'Nakameguro':           '中目黒',
  'FudoumaeM':            '不動前',
  'ShinMarukoBR':         '新丸子',
  'Musashikosugi':        '武蔵小杉',
  'MusashiKosugi':        '武蔵小杉',
  'Nishiya':              '西谷',
  'Motosumiyoshi':        '元住吉',
  'Kikuna':               '菊名',
  'ShinYokohama':         '新横浜',
  'Shin-Yokohama':        '新横浜',
  'HiyoshiTM':            '日吉',
  'Tsunashima':           '綱島',
  'Okurayama':            '大倉山',
  'Kikuna2':              '菊名',
  'Ninomiya':             '二宮',
  'Hiratsuka':            '平塚',
  'Atsugi':               '厚木',
  'Sagamioono':           '相模大野',
  'HonAtsugi':            '本厚木',
  'Isehara':              '伊勢原',
  'Hadano':               '秦野',
  'Shibusawa':            '渋沢',
  'Shin-Matsuda':         '新松田',
  'ShinMatsuda':          '新松田',
  'Matsuda':              '松田',
  'Odawara':              '小田原',
  'Katase-Enoshima':      '片瀬江ノ島',
  'Fujisawa':             '藤沢',
  'Chigasaki':            '茅ヶ崎',
  'Totsuka':              '戸塚',
  'Ofuna':                '大船',
  'Zushi':                '逗子',
  'Hayama':               '葉山',
  'Kamakura':             '鎌倉',
  'KitaKamakura':         '北鎌倉',
  'Yokohama':             '横浜',
  'Higashi-Kanagawa':     '東神奈川',
  'HigashiKanagawa':      '東神奈川',
  'Kawasaki':             '川崎',
  'Ebina':                '海老名',
  'Yamato':               '大和',
  'Shonandai':            '湘南台',
  'Shibakoen':            '芝公園',
};

const TRAIN_TYPES = {
  'Toei.Local':          '各駅停車',
  'Toei.Express':        '急行',
  'Toei.LimitedExpress': '特急',
  'Toei.SemiExpress':    '準急',
  'Toei.AccessExpress':  'アクセス特急',
  'Toei.Rapid':          '快速',
  'Toei.RapidExpress':   '快速急行',
};

const DIRECTIONS = {
  'Outbound': '下り（西高島平方面）',
  'Inbound':  '上り（大手町方面）',
  'OuterLoop': '外回り',
  'InnerLoop': '内回り',
};

let countdownVal = REFRESH_INTERVAL;
let countdownTimer = null;
let currentTrains = [];
let isWeekendOrHoliday = [0, 6].includes(new Date().getDay());

async function fetchHolidays() {
  try {
    const res = await fetch('https://holidays-jp.github.io/api/v1/date.json');
    const data = await res.json();
    const today = new Date();
    const key = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    if (data[key]) isWeekendOrHoliday = true;
  } catch (e) {
    document.getElementById('holidayWarn').style.display = '';
  }
}

function extractSuffix(uri) {
  if (!uri) return null;
  const id = uri.split(':').pop();
  const parts = id.split('.');
  return parts[parts.length - 1];
}

function extractTrainType(uri) {
  if (!uri) return null;
  const id = uri.split(':').pop();
  return TRAIN_TYPES[id] || id;
}

function extractDirection(uri) {
  if (!uri) return null;
  const last = uri.split(':').pop();
  return DIRECTIONS[last] || last;
}

function stationName(uri) {
  const suffix = extractSuffix(uri);
  if (!suffix) return null;
  const lower = suffix.toLowerCase();
  const found = STATIONS.find(s => s.suffix.toLowerCase() === lower);
  if (found) return found.ja;
  const extraKey = Object.keys(EXTRA_STATION_NAMES).find(k => k.toLowerCase() === lower);
  if (extraKey) return EXTRA_STATION_NAMES[extraKey];
  return suffix;
}

function delayInfo(sec) {
  if (!sec || sec === 0) return { text: '定刻', cls: 'delay-0' };
  const min = Math.round(sec / 60);
  if (min < 5) return { text: `+${min}分`, cls: 'delay-small' };
  return { text: `+${min}分`, cls: 'delay-large' };
}

function formatTime(isoStr) {
  if (!isoStr) return '';
  return new Date(isoStr).toLocaleTimeString('ja-JP', {
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

// Returns { stationIdx, isBetween } for where to render a train
// isBetween=true → render between stationIdx and stationIdx+1 (visually below stationIdx row)
function trainPosition(t) {
  const fromSuffix = extractSuffix(t['odpt:fromStation']);
  const toSuffix   = extractSuffix(t['odpt:toStation']);

  const fromIdx = fromSuffix != null ? STATION_INDEX[fromSuffix.toLowerCase()] : undefined;
  const toIdx   = toSuffix   != null ? STATION_INDEX[toSuffix.toLowerCase()]   : undefined;

  // toStation が範囲内
  if (toIdx !== undefined) {
    // fromStation が隣接 → 駅間に表示
    if (fromIdx !== undefined && Math.abs(toIdx - fromIdx) === 1) {
      return { stationIdx: fromIdx, isBetween: true };
    }
    return { stationIdx: toIdx, isBetween: false };
  }

  // toStation 不明・fromStation が範囲内 → fromStation の位置に表示
  if (fromIdx !== undefined) {
    return { stationIdx: fromIdx, isBetween: false };
  }

  return null;
}

// Northbound terminus suffixes (西高島平 direction)
// Return trains with a valid position, excluding Northbound
function getVisibleTrains(trains) {
  const result = [];
  for (const t of trains) {
    if ((t['odpt:railDirection'] || '').endsWith('Northbound')) continue;
    const pos = trainPosition(t);
    if (pos === null) continue;
    result.push({ train: t, pos });
  }
  return result;
}

function openPopup(trainData, anchorEl) {
  const t = trainData;
  const delay = delayInfo(t['odpt:delay']);
  const dest = t['odpt:destinationStation'];
  const destName = dest && dest.length ? stationName(dest[0]) : '不明';
  const trainType = extractTrainType(t['odpt:trainType']);
  const direction = extractDirection(t['odpt:railDirection']);
  const from = stationName(t['odpt:fromStation']);
  const to   = stationName(t['odpt:toStation']);
  const updated = formatTime(t['dc:date']);

  const number = t['odpt:trainNumber'] || '−';
  const owner = t['odpt:trainOwner'] ? extractSuffix(t['odpt:trainOwner']) : '−';

  document.getElementById('popupTitle').textContent = `列車 ${number}`;
  document.getElementById('popupType').textContent = '';

  const rows = [
    ['fromStation', (t['odpt:fromStation'] || '−').replace('odpt.Station:Toei.Mita.', '')],
    ['toStation',   (t['odpt:toStation']   || '−').replace('odpt.Station:Toei.Mita.', '')],
    ['種別',     trainType || '−'],
    ['所有者',   owner],
    ['現在位置', from + (to ? ` → ${to}` : '')],
    ['行先',     destName],
    ['遅延',     delay.text],
    ['更新',     updated],
  ];

  document.getElementById('popupRows').innerHTML = rows.map(([label, val]) =>
    `<div class="popup-row"><span class="label">${label}</span><span>${val || '−'}</span></div>`
  ).join('');

  // Position popup near anchor
  const rect = anchorEl.getBoundingClientRect();
  const popup = document.getElementById('popup');
  const pw = 310, ph = 260;
  const left = Math.min(Math.max(4, rect.left), window.innerWidth - pw - 4);
  const topBelow = rect.bottom + 8;
  const topAbove = rect.top - ph - 8;
  const top = topBelow + ph > window.innerHeight - 4 && topAbove >= 4
    ? topAbove
    : Math.min(topBelow, window.innerHeight - ph - 4);
  popup.style.left = left + 'px';
  popup.style.top  = Math.max(4, top) + 'px';

  document.getElementById('popupOverlay').classList.add('active');
}

function closePopup(event) {
  if (event && event.target !== document.getElementById('popupOverlay')) return;
  document.getElementById('popupOverlay').classList.remove('active');
}

function renderDiagram(trains) {
  const mitaTrains = trains.filter(t => {
    const railway = t['odpt:railway'] || '';
    return railway.includes('Toei.Mita');
  });

  const southbound = getVisibleTrains(mitaTrains);

  // Build per-station train lists
  const stationTrains = STATIONS.map(() => []);

  for (const entry of southbound) {
    stationTrains[entry.pos.stationIdx].push(entry);
  }

  let html = `<div class="diagram-wrapper">`;

  for (let i = 0; i < STATIONS.length; i++) {
    const st = STATIONS[i];
    const isLast = i === STATIONS.length - 1;

    const rowTrains = stationTrains[i];

    // Render train badges for this row (both at-station and between)
    function renderBadges(entries) {
      return entries.map((entry, idx) => {
        const t = entry.train;
        const delay = delayInfo(t['odpt:delay']);
        const dest = t['odpt:destinationStation'];
        const destName = dest && dest.length ? stationName(dest[0]) : '?';
        const number = t['odpt:trainNumber'] || '?';
        const isBetween = entry.pos.isBetween;
        const posClass = isBetween ? 'between' : 'at-station';
        const leftOff = idx * 100;
        const delayText = delay.cls !== 'delay-0' ? ` ${delay.text}` : '';
        const trainNum = t['odpt:trainNumber'] || '';
        const is8car = (/30T$|31T$|35T$|37T$|40T$|41T$|42T$|45T$|46T$|53T$|54T$|55T$|62T$|64T$|70T$|71T$|78T$|79T$|80T$|81T$|86T$|87T$|01K$|03K$|15K$|42K$|G$/.test(trainNum) || (/44T$/.test(trainNum) && !isWeekendOrHoliday) || (/34T$|43T$|52T$|63T$/.test(trainNum) && isWeekendOrHoliday)) || (t['odpt:trainType'] || '') !== 'odpt.TrainType:Toei.Local';
        const carCls = is8car ? 'car-8' : 'car-6';

        return `<div
          class="train-badge ${carCls} ${delay.cls} ${posClass}"
          style="left: ${leftOff}px; top: 50%"
          onclick='showTrainPopup(${JSON.stringify(number)}, this)'
          title="列車${number}"
        >${destName}${delayText}</div>`;
      }).join('');
    }

    html += `
      <div class="station-row${st.suffix === 'Hasune' ? ' highlight' : ''}">
        <div class="station-name">${st.ja}</div>
        <div class="track-col">
          <div class="line-seg-top" style="${i === 0 ? 'background:transparent' : ''}"></div>
          <div class="station-dot"></div>
          <div class="line-seg-bottom" style="${isLast ? 'background:transparent' : ''}"></div>
        </div>
          <div class="lane">
          ${renderBadges(rowTrains)}
        </div>
      </div>
    `;
  }

  html += '</div>';
  return html;
}

function showTrainPopup(trainNumber, el) {
  const t = currentTrains.find(tr => tr['odpt:trainNumber'] === trainNumber);
  if (!t) return;
  openPopup(t, el);
  event.stopPropagation();
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');

  dot.className = 'status-dot' + (state !== 'ok' ? ` ${state}` : '');
}

function startCountdown() {
  countdownVal = REFRESH_INTERVAL;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownVal--;
    if (countdownVal <= 0) {
      clearInterval(countdownTimer);
      fetchTrains();
    }
  }, 1000);
}

async function fetchTrains() {
  setStatus('loading', '更新中...');
  clearInterval(countdownTimer);

  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();


    currentTrains = data;

    document.getElementById('errorBanner').style.display = 'none';
    document.getElementById('content').innerHTML = renderDiagram(data);

    const now = new Date().toLocaleTimeString('ja-JP');
    setStatus('ok', '');
    startCountdown();
  } catch (err) {
    setStatus('error', 'エラー');
    const banner = document.getElementById('errorBanner');
    banner.style.display = 'block';
    banner.textContent = `データの取得に失敗しました: ${err.message}`;
    startCountdown();
  }
}

fetchHolidays().then(() => fetchTrains());
</script>
